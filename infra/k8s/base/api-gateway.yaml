apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: groupsapp-api-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: AUTH_GRPC_URL
              value: "auth-service:50051"
            - name: GROUP_GRPC_URL
              value: "group-service:50052"
            - name: MESSAGE_GRPC_URL
              value: "message-service:50053"
            - name: USER_GRPC_URL
              value: "user-service:50054"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
