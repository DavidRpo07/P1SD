syntax = "proto3";

package groups;

service GroupService {
  rpc CreateGroup (CreateGroupRequest) returns (CreateGroupResponse);
  rpc ListMyGroups (ListMyGroupsRequest) returns (ListMyGroupsResponse);
  rpc AddMember (AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember (RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc ListGroupMembers (ListGroupMembersRequest) returns (ListGroupMembersResponse);
  rpc CreateChannel (CreateChannelRequest) returns (CreateChannelResponse);
  rpc ListGroupChannels (ListGroupChannelsRequest) returns (ListGroupChannelsResponse);
  rpc CheckMembership (CheckMembershipRequest) returns (CheckMembershipResponse);
  rpc CheckChannelMembership (CheckChannelMembershipRequest) returns (CheckChannelMembershipResponse);
}

message CreateGroupRequest {
  string name = 1;
  string description = 2;
  string owner_user_id = 3;
}

message CreateGroupResponse {
  string group_id = 1;
  string name = 2;
  string description = 3;
  string owner_user_id = 4;
}

message ListMyGroupsRequest {
  string user_id = 1;
}

message GroupItem {
  string group_id = 1;
  string name = 2;
  string description = 3;
  string owner_user_id = 4;
}

message ListMyGroupsResponse {
  repeated GroupItem items = 1;
}

message AddMemberRequest {
  string group_id = 1;
  string requester_user_id = 2;
  string member_user_id = 3;
}

message AddMemberResponse {
  bool ok = 1;
}

message RemoveMemberRequest {
  string group_id = 1;
  string requester_user_id = 2;
  string member_user_id = 3;
}

message RemoveMemberResponse {
  bool ok = 1;
}

message ListGroupMembersRequest {
  string group_id = 1;
  string requester_user_id = 2;
}

message GroupMemberItem {
  string user_id = 1;
  string display_name = 2;
  string email = 3;
  bool is_admin = 4;
}

message ListGroupMembersResponse {
  repeated GroupMemberItem items = 1;
}

message CheckMembershipRequest {
  string group_id = 1;
  string user_id = 2;
}

message CheckMembershipResponse {
  bool is_member = 1;
}

message CreateChannelRequest {
  string group_id = 1;
  string requester_user_id = 2;
  string name = 3;
  string description = 4;
}

message CreateChannelResponse {
  string channel_id = 1;
  string group_id = 2;
  string name = 3;
  string description = 4;
}

message ListGroupChannelsRequest {
  string group_id = 1;
  string requester_user_id = 2;
}

message ChannelItem {
  string channel_id = 1;
  string group_id = 2;
  string name = 3;
  string description = 4;
  bool is_default = 5;
}

message ListGroupChannelsResponse {
  repeated ChannelItem items = 1;
}

message CheckChannelMembershipRequest {
  string channel_id = 1;
  string user_id = 2;
}

message CheckChannelMembershipResponse {
  bool is_member = 1;
  string group_id = 2;
}
