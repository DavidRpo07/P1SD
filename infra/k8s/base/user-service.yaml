apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: groupsapp-user-service:latest
          ports:
            - containerPort: 50054
              name: grpc
          env:
            - name: USER_GRPC_URL
              value: "0.0.0.0:50054"
            - name: AUTH_SERVICE_GRPC_URL
              value: "auth-service:50051"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_USER
            - name: POSTGRES_SSL
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_SSL
            - name: POSTGRES_SSL_REJECT_UNAUTHORIZED
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_SSL_REJECT_UNAUTHORIZED
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "groupsapp_user"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: REDIS_PORT
            - name: PRESENCE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: PRESENCE_TTL_SECONDS
          readinessProbe:
            tcpSocket:
              port: 50054
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50054
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
