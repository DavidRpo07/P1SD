apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: groupsapp-notification-service:latest
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: RABBITMQ_EXCHANGE
            - name: RABBITMQ_RETRY_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: RABBITMQ_RETRY_EXCHANGE
            - name: RABBITMQ_DLX_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: RABBITMQ_DLX_EXCHANGE
            - name: NOTIFICATION_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_QUEUE
            - name: NOTIFICATION_RETRY_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_RETRY_QUEUE
            - name: NOTIFICATION_DLQ
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_DLQ
            - name: NOTIFICATION_MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_MAX_RETRIES
            - name: NOTIFICATION_RETRY_TTL_MS
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_RETRY_TTL_MS
            - name: NOTIFICATION_FAIL_MODE
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NOTIFICATION_FAIL_MODE
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "groupsapp_notification"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
