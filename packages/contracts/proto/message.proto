syntax = "proto3";

package messaging;

service MessageService {
  rpc CreateAttachmentUpload (CreateAttachmentUploadRequest) returns (CreateAttachmentUploadResponse);
  rpc CompleteAttachmentUpload (CompleteAttachmentUploadRequest) returns (AttachmentItem);
  rpc GetAttachment (GetAttachmentRequest) returns (AttachmentItem);

  rpc SendChannelMessage (SendChannelMessageRequest) returns (SendMessageResponse);
  rpc ListChannelMessages (ListChannelMessagesRequest) returns (ListMessagesResponse);

  rpc SendDirectMessage (SendDirectMessageRequest) returns (SendMessageResponse);
  rpc ListDirectMessages (ListDirectMessagesRequest) returns (ListMessagesResponse);

  rpc MarkDelivered (MarkDeliveredRequest) returns (SimpleAck);
  rpc MarkRead (MarkReadRequest) returns (SimpleAck);
}

message SendChannelMessageRequest {
  string channel_id = 1;
  string sender_user_id = 2;
  string body = 3;
  repeated string attachment_ids = 4;
  string idempotency_key = 5;
}

message SendDirectMessageRequest {
  string sender_user_id = 1;
  string recipient_user_id = 2;
  string body = 3;
  repeated string attachment_ids = 4;
  string idempotency_key = 5;
}

message SendMessageResponse {
  string message_id = 1;
  string channel_id = 2;
  string sender_user_id = 3;
  string body = 4;
  int64 seq = 5;
  string created_at = 6;
  bool delivered = 7;
  bool read = 8;
  int32 delivered_count = 9;
  int32 read_count = 10;
  repeated AttachmentItem attachments = 11;
}

message ListChannelMessagesRequest {
  string channel_id = 1;
  string requester_user_id = 2;
  int32 limit = 3;
}

message ListDirectMessagesRequest {
  string requester_user_id = 1;
  string peer_user_id = 2;
  int32 limit = 3;
}

message MessageItem {
  string message_id = 1;
  string channel_id = 2;
  string sender_user_id = 3;
  string body = 4;
  int64 seq = 5;
  string created_at = 6;
  bool delivered = 7;
  bool read = 8;
  int32 delivered_count = 9;
  int32 read_count = 10;
  repeated AttachmentItem attachments = 11;
}

message ListMessagesResponse {
  repeated MessageItem items = 1;
}

message MarkDeliveredRequest {
  string message_id = 1;
  string user_id = 2;
}

message MarkReadRequest {
  string message_id = 1;
  string user_id = 2;
}

message SimpleAck {
  bool ok = 1;
}

message CreateAttachmentUploadRequest {
  string owner_user_id = 1;
  string file_name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
}

message CreateAttachmentUploadResponse {
  string attachment_id = 1;
  string upload_url = 2;
  string method = 3;
  map<string, string> headers = 4;
  int32 expires_in_seconds = 5;
  string file_name = 6;
  string content_type = 7;
  int64 size_bytes = 8;
}

message CompleteAttachmentUploadRequest {
  string attachment_id = 1;
  string requester_user_id = 2;
}

message GetAttachmentRequest {
  string attachment_id = 1;
  string requester_user_id = 2;
}

message AttachmentItem {
  string attachment_id = 1;
  string owner_user_id = 2;
  string file_name = 3;
  string content_type = 4;
  int64 size_bytes = 5;
  string status = 6;
  string created_at = 7;
  string download_url = 8;
}
